name: Publish Docker image

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Rust + polars + aws-sdk-s3 link is slow on a cold cache.
    timeout-minutes: 60
    permissions:
      # `contents: write` so the tag-bump step can push a new git tag.
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the tag action can find the latest existing tag.
          fetch-depth: 0

      # On push to main: read the latest v* tag, bump it (default: patch;
      # `feat:`/`fix:`/`BREAKING CHANGE` follow conventional commits),
      # create and push the new tag. Skipped for PRs and for pushes that
      # already carry a v* tag (handled below by `type=semver`).
      - name: Bump version and push tag
        id: tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tag inputs:
          #   - `type=ref` for branch / PR builds.
          #   - `type=semver` for direct v* tag pushes (existing behavior).
          #   - `type=raw` picks up the freshly bumped tag from the
          #     previous step on main-branch pushes.
          #   - `type=sha` for traceability on every build.
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ steps.tag.outputs.new_version }},enable=${{ steps.tag.outputs.new_version != '' }}
            type=raw,value=${{ steps.tag.outputs.new_tag }},enable=${{ steps.tag.outputs.new_tag != '' }}
            type=sha,format=short
          flavor: |
            latest=true

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
